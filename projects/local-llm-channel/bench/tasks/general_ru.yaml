suite:
  name: general_ru
  category: general_ru
  language: ru
  description: Russian instruction following and grammar
tasks:
  - key: formal_rewrite
    prompt: "Перепиши абзац в деловом стиле: «Привет, мы тестируем локальную модель на ноутбуке с 6 ГБ видеопамяти.»"
    scorer: judge
    max_tokens: 256
    weight: 1.0
  - key: extract_list
    prompt: "Из текста извлеки три пункта списка: Модель qwen3:4b показала 34 ток/с. VRAM пик 3200 МБ. Рекомендуется для чата."
    scorer: judge
    max_tokens: 200
    weight: 1.0
