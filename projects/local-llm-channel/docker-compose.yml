# Optional: Postgres + API (inference stays on host Ollama)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llmchannel
      POSTGRES_PASSWORD: llmchannel
      POSTGRES_DB: llmchannel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://llmchannel:llmchannel@postgres:5432/llmchannel
    depends_on:
      - postgres

volumes:
  pgdata:
