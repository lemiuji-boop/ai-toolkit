# Единый сервер CED на Ubuntu (Docker).
# Клиенты Windows: WinForms :8000, браузер :80 (/api через nginx).
# Каталог PDF: bind-mount с хоста (после OpenVPN + SMB/CIFS).
#
# Запуск:
#   cp .env.server.example .env   # настроить CED_CATALOG_MOUNT и секреты
#   ./scripts/deploy-ubuntu-server.sh

services:
  backend:
    ports:
      - "${CED_API_PORT:-8000}:8000"
    volumes:
      - file_storage:/data/storage
      - ${CED_CATALOG_MOUNT:-./data/catalog}:/data/catalog
    environment:
      CATALOG_ROOT: /data/catalog

  celery-worker:
    volumes:
      - file_storage:/data/storage
      - ${CED_CATALOG_MOUNT:-./data/catalog}:/data/catalog
    environment:
      CATALOG_ROOT: /data/catalog

  ai-agent:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11435
    volumes:
      - file_storage:/data/storage
      - ${CED_CATALOG_MOUNT:-./data/catalog}:/data/catalog

  nginx:
    ports:
      - "${CED_HTTP_PORT:-80}:80"
