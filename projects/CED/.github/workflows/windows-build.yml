name: Windows Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build CED packages
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          ./build/windows/build-all.ps1

      - name: Upload CED-Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: CED-Server
          path: dist/CED-Server/
          if-no-files-found: error

      - name: Upload CED-Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: CED-Client
          path: dist/CED-Client/KdCatalog.exe
          if-no-files-found: error
