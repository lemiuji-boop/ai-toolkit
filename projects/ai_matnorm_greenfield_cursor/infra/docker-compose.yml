# Уникальное имя проекта — иначе тома совпадают с другими compose в папке infra/
name: ai-matnorm

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_matnorm
      POSTGRES_USER: ai_matnorm
      POSTGRES_PASSWORD: ai_matnorm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ai_matnorm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ai_matnorm -d ai_matnorm && psql -U ai_matnorm -d ai_matnorm -c 'SELECT 1'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ai_matnorm_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg://ai_matnorm:ai_matnorm_dev_password@postgres:5432/ai_matnorm
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ai_matnorm:ai_matnorm_dev_password@postgres:5432/ai_matnorm
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.run_worker

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ai_matnorm_qdrant_data:/qdrant/storage

volumes:
  ai_matnorm_postgres_data:
  ai_matnorm_minio_data:
  ai_matnorm_qdrant_data:
