# НТИ.Сбор — запуск: docker compose up --build
# или: ./start.sh

name: nti-sbor

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nti-sbor-api
    restart: unless-stopped
    ports:
      - "${NTI_PORT:-8010}:8010"
    volumes:
      - nti_sbor_data:/app/data
    environment:
      NTI_DATA_DIR: /app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8010/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Публичный HTTPS без проброса портов (URL в логах: docker compose logs tunnel)
  tunnel:
    image: cloudflare/cloudflared:2024.12.2
    container_name: nti-sbor-tunnel
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://api:8010
    profiles:
      - internet

volumes:
  nti_sbor_data:
