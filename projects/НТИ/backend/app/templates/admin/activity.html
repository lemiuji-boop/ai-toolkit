{% extends "admin/base.html" %}
{% block title %}Журнал — Админ{% endblock %}
{% block content %}
<h1>Журнал действий</h1>
<div class="card">
  <table>
    <tr><th>Время</th><th>Пользователь</th><th>Действие</th><th>Детали</th></tr>
    {% for row in logs %}
    <tr>
      <td class="muted">{{ row.created_at }}</td>
      <td>{{ row.username or '—' }}</td>
      <td>{{ row.action }}</td>
      <td>{{ row.detail }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
