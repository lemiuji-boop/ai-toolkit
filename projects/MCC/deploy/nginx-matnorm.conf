# TLS-терминатор перед бэкендом МАТНОРМ.
#
# Решает проблему mixed content (ARCHITECTURE.md): надстройка раздаётся по HTTPS
# (Vercel/nginx), поэтому и бэкенд должен отвечать по HTTPS. Этот reverse-proxy
# принимает HTTPS на хосте предприятия и проксирует на локальный backend:8000
# и rag:8020. Сертификат — корпоративный (внутренний УЦ) или self-signed для пилота.
#
# Установка (Ubuntu-хост):
#   sudo apt install -y nginx
#   sudo cp deploy/nginx-matnorm.conf /etc/nginx/sites-available/matnorm
#   sudo ln -s /etc/nginx/sites-available/matnorm /etc/nginx/sites-enabled/
#   # положить сертификат и ключ по путям ниже
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name matnorm.localdomain;   # внутреннее DNS-имя Ubuntu-хоста

    ssl_certificate     /etc/nginx/ssl/matnorm.crt;
    ssl_certificate_key /etc/nginx/ssl/matnorm.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Бэкенд расчёта норм
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 64m;       # сканы КД и STEP
    }
    location = /health  { proxy_pass http://127.0.0.1:8000; }
    location = /version { proxy_pass http://127.0.0.1:8000; }

    # RAG-сервис нормативов (СЕРВИС-05)
    location /rag/ {
        proxy_pass http://127.0.0.1:8020/;
        proxy_set_header Host $host;
    }
}

# Перенаправление HTTP → HTTPS (на случай обращения по http)
server {
    listen 80;
    server_name matnorm.localdomain;
    return 301 https://$host$request_uri;
}
