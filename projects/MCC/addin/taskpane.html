<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МАТНОРМ-XL</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css">
</head>
<body>
  <div class="wrap">
    <h1>МАТНОРМ-XL</h1>
    <p class="muted">Распознавание КД + 3D, расчёт норм, каталог выгрузок.</p>

    <div class="conn-row">
      <span id="connDot" class="dot off" title="Статус связи"></span>
      <span id="connLabel" class="conn-label">Проверка связи…</span>
    </div>

    <label>Адрес сервиса (tunnel HTTPS)</label>
    <input id="backend" type="text" placeholder="https://….trycloudflare.com">
    <button id="saveBackend" class="ghost">Проверить и сохранить</button>
    <div id="status" class="status">Не подключено</div>

    <hr>
    <h2 class="section">Каталог данных на сервере</h2>
    <button id="refreshCatalog" class="ghost">Обновить каталог</button>
    <div id="catalog" class="catalog muted">Подключитесь к сервису для загрузки каталога.</div>

    <hr>
    <h2 class="section">Запрос / чат</h2>
    <div id="chatLog" class="chat-log"></div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="выгрузить расчёт, каталог, help…">
      <button id="chatSend" class="primary chat-send">→</button>
    </div>

    <hr>
    <h2 class="section">Новый расчёт</h2>
    <label>Чертёж (скан PDF/PNG)</label>
    <input id="drawing" type="file" accept=".pdf,.png,.jpg,.jpeg">
    <label>3D-модель (STEP, опционально)</label>
    <input id="model3d" type="file" accept=".step,.stp">
    <button id="run" class="primary">Распознать и рассчитать</button>

    <hr>
    <button id="write" disabled>Записать ведомость в лист</button>
    <button id="check" class="ghost" disabled>Нормоконтроль</button>

    <div id="resultPreview" class="result-preview"></div>
    <div id="flags" class="flags"></div>
  </div>
  <script src="taskpane.js"></script>
</body>
</html>
