name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  task-feasibility-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/task-feasibility/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  local-llm-channel-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/local-llm-channel
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run pytest -q
